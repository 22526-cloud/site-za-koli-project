<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <title>CarsBG - Твоята нова кола</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <nav>
        <div class="logo">CarsBG</div>
        <ul>
            <li><a href="#">Начало</a></li>
            <li><a href="#">Обяви</a></li>
            <li><button class="add-btn">Добави обява</button></li>
        </ul>
    </nav>

    <header class="search-section">
        <h1>Намери своята мечтана кола</h1>
        <div class="search-bar">
            <input type="text" placeholder="Марка (напр. BMW)">
            <input type="number" placeholder="Макс. цена">
            <button type="submit">Търси</button>
        </div>
    </header>

    <main id="car-container">
        <p>Зареждане на най-новите обяви...</p>
    </main>
</body>
</html>
