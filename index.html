<!DOCTYPE html>
<html lang="bg">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>AutoMarket</title>
    <link rel="stylesheet" href="/static/style.css">
</head>
<body>

<header>
    <h1>🚗 AutoMarket</h1>
</header>

<div class="filter-section">
    <input type="text" id="search" placeholder="Търси марка или модел..." onkeyup="filterCars()">
    <div style="margin: 10px 0;">
        <label>До: <span id="priceValue">400,000</span> €</label><br>
        <input type="range" id="priceRange" min="20000" max="400000" step="5000" value="400000" oninput="filterCars()" style="width:100%">
    </div>
    <div class="nav-buttons">
        <button class="btn-nav" onclick="showAll()">Всички</button>
        <button class="btn-fav" onclick="showFavorites()">❤ Любими</button>
    </div>
</div>

<div id="cars-container"></div>

<div id="carModal" class="modal">
    <div class="modal-content">
        <span class="close" onclick="closeModal()">&times;</span>
        <div id="modal-details"></div>
    </div>
</div>

<script src="/static/script.js"></script>
</body>
</html>
